name: Sync issue labels to project status

on:
  issues:
    types: [labeled, unlabeled, closed, reopened, opened]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Map labels to Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Map your labels → project status options
            let status = null;
            if (labels.includes("status: needs triage")) status = "To triage";
            if (labels.includes("status: planned")) status = "Backlog";
            if (labels.includes("status: in progress")) status = "In progress";
            if (labels.includes("status: in review")) status = "In review";
            if (labels.includes("status: done")) status = "Done";
            if (labels.includes("status: wontfix")) status = "Done";

            if (context.payload.action === "closed") status = "Done";
            if (context.payload.action === "reopened") status = "To triage";
            if (context.payload.action === "opened" && !status) status = "To triage";

            if (!status) {
              console.log("No matching status for labels:", labels);
              return;
            }

            // Query project + fields
            const projectNumber = 2;
            const project = await github.graphql(`
              query($owner: String!, $repo: String!, $projectNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  projectV2(number: $projectNumber) {
                    id
                    fields(first: 20) {
                      nodes { id name dataType options { id name } }
                    }
                  }
                }
              }
            `, { owner, repo, projectNumber });

            const projectId = project.repository.projectV2.id;
            const statusField = project.repository.projectV2.fields.nodes.find(f => f.name === "Status");
            if (!statusField) {
              console.log("Could not find Status field in project");
              return;
            }
            const option = statusField.options.find(o => o.name === status);
            if (!option) {
              console.log("No option found for status:", status);
              return;
            }

            // Find project item for this issue
            const items = await github.graphql(`
              query($owner: String!, $repo: String!, $projectNumber: Int!, $issueId: ID!) {
                repository(owner: $owner, name: $repo) {
                  projectV2(number: $projectNumber) {
                    items(first: 50, query: $issueId) {
                      nodes { id content { ... on Issue { id } } }
                    }
                  }
                }
              }
            `, { owner, repo, projectNumber, issueId: issue.node_id });

            const item = items.repository.projectV2.items.nodes.find(i => i.content && i.content.id === issue.node_id);
            if (!item) {
              console.log("Issue is not yet in the project, skipping.");
              return;
            }

            // Update the Status field
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) { clientMutationId }
              }
            `, {
              projectId,
              itemId: item.id,
              fieldId: statusField.id,
              optionId: option.id
            });

            console.log(`Moved issue #${issue.number} to ${status}`);
